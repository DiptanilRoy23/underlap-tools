<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Player Comparison — The Underlap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#fff;color:#0f0f0f;padding:1.5rem}
.uw-top{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.uw-role{font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(0,0,0,0.2);color:#777;background:#fff;transition:all 0.15s}
.uw-role.active{background:#0f0f0f;color:#fff;border-color:#0f0f0f}
.uw-selectors{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.uw-sel{display:flex;flex-direction:column;gap:6px}
.uw-sel label{font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#777}
.uw-sel select{font-size:14px;padding:8px 12px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#0f0f0f;cursor:pointer}
.uw-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.uw-toggle{display:flex;align-items:center;gap:8px}
.uw-toggle span{font-size:12px;color:#777}
.uw-toggle span.on{color:#0f0f0f;font-weight:500}
.tog{width:36px;height:20px;border-radius:10px;background:#ccc;position:relative;cursor:pointer;border:none;transition:background 0.2s}
.tog.on{background:#3B6D11}
.tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left 0.2s}
.tog.on::after{left:19px}
.uw-legend{display:flex;align-items:center;gap:14px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#777}
.leg-bar{width:20px;height:4px;border-radius:2px}
.leg-green{background:#639922}
.leg-grey{background:#D3D1C7}
.uw-names{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.uw-pname{font-size:15px;font-weight:500;color:#0f0f0f;padding:10px 14px;border-radius:8px;background:#f5f4f0;text-align:center}
.uw-pname span{display:block;font-size:11px;font-weight:400;color:#777;margin-top:2px}
.uw-section{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#777;padding:10px 0 4px;border-bottom:1px solid rgba(0,0,0,0.08);margin-bottom:2px}
.uw-row{display:grid;grid-template-columns:1fr 120px 1fr;gap:8px;align-items:center;padding:6px 0 2px}
.uw-val{font-size:14px;font-weight:500;color:#0f0f0f}
.uw-val.p1{text-align:left}
.uw-val.p2{text-align:right}
.uw-metric{font-size:12px;color:#777;text-align:center}
.uw-bars{display:grid;grid-template-columns:1fr 120px 1fr;gap:8px;align-items:center;padding:0 0 6px;border-bottom:1px solid rgba(0,0,0,0.06)}
.uw-bars:last-child{border-bottom:none}
.bar-left{display:flex;justify-content:flex-end}
.bar-right{display:flex;justify-content:flex-start}
.bar{height:4px;border-radius:2px;min-width:2px}
.bar-lead{background:#639922}
.bar-trail{background:#D3D1C7}
.uw-empty{text-align:center;padding:2rem;font-size:14px;color:#777}
.uw-loading{text-align:center;padding:2rem;font-size:14px;color:#777}
.uw-error{text-align:center;padding:1rem;font-size:13px;color:#993C1D;background:#FAECE7;border-radius:8px;margin-bottom:1rem}
</style>
</head>
<body>

<div class="uw-top">
  <button class="uw-role active" onclick="setRole('attacker',this)">Attackers</button>
  <button class="uw-role" onclick="setRole('midfielder',this)">Midfielders</button>
  <button class="uw-role" onclick="setRole('defender',this)">Defenders</button>
  <button class="uw-role" onclick="setRole('goalkeeper',this)">Goalkeepers</button>
</div>

<div id="uw-status"></div>

<div class="uw-selectors">
  <div class="uw-sel"><label>Player 1</label><select id="p1sel" onchange="render()"><option value="">Loading...</option></select></div>
  <div class="uw-sel"><label>Player 2</label><select id="p2sel" onchange="render()"><option value="">Loading...</option></select></div>
</div>

<div class="uw-toggle-row">
  <div class="uw-toggle">
    <span id="lbl-tot" class="on">Season totals</span>
    <button class="tog" id="tog" onclick="toggleMode()"></button>
    <span id="lbl-p90">Per 90</span>
  </div>
  <div class="uw-legend">
    <div class="leg-item"><div class="leg-bar leg-green"></div>Leading</div>
    <div class="leg-item"><div class="leg-bar leg-grey"></div>Trailing</div>
  </div>
</div>

<div id="uw-out"><div class="uw-loading">Loading player data...</div></div>

<script>
const SUPABASE_URL = 'https://nqkxvulkxdplxzihmynf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xa3h2dWxreGRwbHh6aWhteW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0Njc4ODUsImV4cCI6MjA5MDA0Mzg4NX0.LG8p-kMszwNQFb0R1yQx7_VyqJw7aAev1tenBFg5mfc';

// Maps Supabase column names → widget key names (matching existing METRICS config)
function mapRow(r) {
  return {
    // identity
    name:          r.player_name,
    club:          r.club_name,
    role:          r.role,
    mins:          r.minutes_played,
    apps:          r.appearances,
    // output
    goals:         r.goals,
    assists:       r.assists,
    xg:            r.xg,
    xa:            r.xa,
    npGoals:       r.non_penalty_goals,
    // shooting
    shots:         r.shots_total,
    shotsOT:       r.shots_on_target,
    shotAcc:       r.shot_accuracy_pct,
    conv:          r.conversion_rate,
    penScored:     r.penalties_scored,
    penTaken:      r.penalties_taken,
    // creation
    keyPasses:     r.key_passes,
    bigChances:    r.big_chances_created,
    // dribbling
    dribbles:      r.dribbles_completed,
    dribblePct:    r.dribble_success_pct,
    // fouls
    foulsWon:      r.fouls_won,
    foulsComm:     r.fouls_committed,
    // passing
    passes:        r.passes_total,
    passAcc:       r.pass_accuracy_pct,
    fwdPasses:     r.forward_passes,
    longBalls:     r.long_balls,
    throughBalls:  r.through_balls,
    crosses:       r.crosses,
    chancesCreated:r.chances_created,
    // defence
    tackles:       r.tackles,
    tacklePct:     r.tackle_success_pct,
    interceptions: r.interceptions,
    duelsWon:      r.duels_won,
    duelsTotal:    r.duels_total,
    duelsWonPct:   r.duels_won_pct,
    groundDW:      r.ground_duels_won,
    groundDT:      r.ground_duels_total,
    aerialDW:      r.aerial_duels_won,
    aerialDT:      r.aerial_duels_total,
    ballRec:       r.ball_recoveries,
    dribbPast:     r.dribbles_past,
    blocks:        r.blocks,
    clearances:    r.clearances,
    headedClear:   r.headed_clearances,
    errors:        r.errors_leading_goal,
    penConc:       r.penalties_conceded,
    progCarries:   r.progressive_carries,
    // GK
    cleanSheets:   r.clean_sheets,
    saves:         r.saves,
    savePct:       r.save_pct,
    goalsConceded: r.goals_conceded,
    penSaved:      r.penalties_saved,
    sweeperClear:  r.sweeper_clearances,
    catches:       r.catches,
    crossesAgainst:r.crosses_against,
    xgConc:        r.xg_conceded,
    psxg:          r.psxg,
    goalsAllowedP90: r.goals_allowed_per90,
  };
}

const LOWER_BETTER=['errors','foulsComm','penConc','goalsAllowedP90','goalsConceded','crossesAgainst','dribbPast','xgConc'];

const METRICS={
  attacker:[
    {section:"Output & shooting",rows:[
      {label:"Goals",key:"goals"},{label:"Assists",key:"assists"},{label:"xG",key:"xg"},{label:"xA",key:"xa"},
      {label:"Non-penalty goals",key:"npGoals"},{label:"Shots total",key:"shots"},{label:"Shots on target",key:"shotsOT"},
      {label:"Shot accuracy %",key:"shotAcc",suf:"%",nop90:1},{label:"Conversion rate",key:"conv",suf:"%",nop90:1},
    ]},
    {section:"Creation & movement",rows:[
      {label:"Key passes",key:"keyPasses"},{label:"Big chances created",key:"bigChances"},
      {label:"Dribbles completed",key:"dribbles"},{label:"Dribble success %",key:"dribblePct",suf:"%",nop90:1},{label:"Fouls won",key:"foulsWon"},
    ]},
    {section:"Context",rows:[
      {label:"Minutes played",key:"mins",nop90:1},{label:"Appearances",key:"apps",nop90:1},
      {label:"Goals per 90",key:"goals",forcep90:1},{label:"xG per 90",key:"xg",forcep90:1},
    ]}
  ],
  midfielder:[
    {section:"Output & creation",rows:[
      {label:"Goals",key:"goals"},{label:"Assists",key:"assists"},{label:"xG",key:"xg"},{label:"xA",key:"xa"},
      {label:"Key passes",key:"keyPasses"},{label:"Big chances created",key:"bigChances"},
    ]},
    {section:"Passing",rows:[
      {label:"Passes total",key:"passes"},{label:"Pass accuracy %",key:"passAcc",suf:"%",nop90:1},
      {label:"Forward passes",key:"fwdPasses"},{label:"Long balls",key:"longBalls"},{label:"Through balls",key:"throughBalls"},
      {label:"Crosses",key:"crosses"},{label:"Chances created",key:"chancesCreated"},
    ]},
    {section:"Defensive contribution",rows:[
      {label:"Tackles",key:"tackles"},{label:"Interceptions",key:"interceptions"},
      {label:"Duels won",key:"duelsWon"},{label:"Duels won %",key:"duelsWonPct",suf:"%",nop90:1},
      {label:"Ground duels won",key:"groundDW"},{label:"Aerial duels won",key:"aerialDW"},
      {label:"Fouls committed",key:"foulsComm"},{label:"Ball recoveries",key:"ballRec"},
    ]},
    {section:"Context",rows:[
      {label:"Minutes played",key:"mins",nop90:1},{label:"Appearances",key:"apps",nop90:1},
      {label:"Dribbles completed",key:"dribbles"},{label:"Fouls won",key:"foulsWon"},
    ]}
  ],
  defender:[
    {section:"Defensive actions",rows:[
      {label:"Tackles",key:"tackles"},{label:"Tackle success %",key:"tacklePct",suf:"%",nop90:1},
      {label:"Interceptions",key:"interceptions"},{label:"Blocks",key:"blocks"},
      {label:"Clearances",key:"clearances"},{label:"Headed clearances",key:"headedClear"},
      {label:"Ball recoveries",key:"ballRec"},{label:"Errors leading to goal",key:"errors"},
    ]},
    {section:"Duels & discipline",rows:[
      {label:"Ground duels won",key:"groundDW"},{label:"Aerial duels won",key:"aerialDW"},
      {label:"Duels won %",key:"duelsWonPct",suf:"%",nop90:1},{label:"Fouls committed",key:"foulsComm"},
      {label:"Penalties conceded",key:"penConc"},
    ]},
    {section:"Ball playing",rows:[
      {label:"Passes total",key:"passes"},{label:"Pass accuracy %",key:"passAcc",suf:"%",nop90:1},
      {label:"Long balls",key:"longBalls"},{label:"Progressive carries",key:"progCarries"},
    ]},
    {section:"Context",rows:[
      {label:"Minutes played",key:"mins",nop90:1},{label:"Appearances",key:"apps",nop90:1},
      {label:"Goals",key:"goals"},{label:"Assists",key:"assists"},{label:"Clean sheets",key:"cleanSheets"},
    ]}
  ],
  goalkeeper:[
    {section:"Shot stopping",rows:[
      {label:"Saves",key:"saves"},{label:"Save %",key:"savePct",suf:"%",nop90:1},
      {label:"Goals conceded",key:"goalsConceded"},{label:"Clean sheets",key:"cleanSheets"},
      {label:"Penalties saved",key:"penSaved"},{label:"Errors leading to goal",key:"errors"},
    ]},
    {section:"Aerial & distribution",rows:[
      {label:"Sweeper clearances",key:"sweeperClear"},{label:"Catches",key:"catches"},{label:"Crosses against",key:"crossesAgainst"},
    ]},
    {section:"Ball playing & advanced",rows:[
      {label:"Passes total",key:"passes"},{label:"Pass accuracy %",key:"passAcc",suf:"%",nop90:1},
      {label:"Long balls",key:"longBalls"},{label:"xG conceded",key:"xgConc"},{label:"PSxG",key:"psxg"},
    ]},
    {section:"Context",rows:[
      {label:"Minutes played",key:"mins",nop90:1},{label:"Appearances",key:"apps",nop90:1},{label:"Goals allowed per 90",key:"goalsAllowedP90",nop90:1},
    ]}
  ]
};

// All players keyed by role, loaded from Supabase
let PLAYERS = { attacker:[], midfielder:[], defender:[], goalkeeper:[] };
let role = 'attacker', per90 = false;

async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/player_stats_per90?select=*&order=player_name.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();

    // Reset
    PLAYERS = { attacker:[], midfielder:[], defender:[], goalkeeper:[] };

    rows.forEach(r => {
      const mapped = mapRow(r);
      if (PLAYERS[mapped.role]) PLAYERS[mapped.role].push(mapped);
    });

    document.getElementById('uw-status').innerHTML = '';
    populateSelects();
    render();
  } catch (e) {
    document.getElementById('uw-status').innerHTML =
      `<div class="uw-error">Could not load player data. Please refresh the page.</div>`;
    document.getElementById('uw-out').innerHTML =
      '<div class="uw-empty">—</div>';
  }
}

function setRole(r, btn) {
  role = r;
  document.querySelectorAll('.uw-role').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  populateSelects();
  render();
}

function populateSelects() {
  const pl = PLAYERS[role];
  ['p1sel','p2sel'].forEach((id, i) => {
    const s = document.getElementById(id);
    s.innerHTML = '<option value="">Select player...</option>';
    pl.forEach((p, idx) => {
      const o = document.createElement('option');
      o.value = idx;
      o.textContent = p.name + ' (' + p.club + ')';
      s.appendChild(o);
    });
    s.value = (pl.length > i) ? String(i) : '';
  });
}

function toggleMode() {
  per90 = !per90;
  const t = document.getElementById('tog');
  t.classList.toggle('on', per90);
  document.getElementById('lbl-tot').classList.toggle('on', !per90);
  document.getElementById('lbl-p90').classList.toggle('on', per90);
  render();
}

function getVal(p, m) {
  let v = p[m.key];
  if (v === undefined || v === null) return null;
  if (m.forcep90) return v / (p.mins / 90);
  if (per90 && !m.nop90) return v / (p.mins / 90);
  return v;
}

function fmt(v, m) {
  if (v === null) return '—';
  const isPct = m.suf === '%';
  const isRaw = m.nop90 && !m.forcep90;
  if (isPct || isRaw) return parseFloat(v.toFixed(1)) + (m.suf || '');
  if (per90 || m.forcep90) return parseFloat(v.toFixed(2)) + (m.suf || '');
  return Math.round(v) + (m.suf || '');
}

function render() {
  const p1i = document.getElementById('p1sel').value;
  const p2i = document.getElementById('p2sel').value;
  const out = document.getElementById('uw-out');
  if (p1i === '' || p2i === '') { out.innerHTML = '<div class="uw-empty">Select two players to compare</div>'; return; }
  if (p1i === p2i) { out.innerHTML = '<div class="uw-empty">Select two different players</div>'; return; }
  const p1 = PLAYERS[role][parseInt(p1i)], p2 = PLAYERS[role][parseInt(p2i)];
  let h = `<div class="uw-names"><div class="uw-pname">${p1.name}<span>${p1.club}</span></div><div class="uw-pname">${p2.name}<span>${p2.club}</span></div></div>`;
  METRICS[role].forEach(sec => {
    h += `<div class="uw-section">${sec.section}</div>`;
    sec.rows.forEach(m => {
      const v1 = getVal(p1, m), v2 = getVal(p2, m);
      const f1 = fmt(v1, m), f2 = fmt(v2, m);
      const lowerBetter = LOWER_BETTER.includes(m.key);
      let c1 = 'bar-trail', c2 = 'bar-trail';
      if (v1 !== null && v2 !== null && v1 !== v2) {
        const p1wins = lowerBetter ? v1 < v2 : v1 > v2;
        if (p1wins) c1 = 'bar-lead'; else c2 = 'bar-lead';
      }
      const max = Math.max(Math.abs(v1 || 0), Math.abs(v2 || 0), 0.001);
      const w1 = Math.round((Math.abs(v1 || 0) / max) * 90);
      const w2 = Math.round((Math.abs(v2 || 0) / max) * 90);
      h += `<div class="uw-row">
        <div class="uw-val p1">${f1}</div>
        <div class="uw-metric">${m.label}</div>
        <div class="uw-val p2">${f2}</div>
      </div>
      <div class="uw-bars">
        <div class="bar-left"><div class="bar ${c1}" style="width:${w1}px"></div></div>
        <div></div>
        <div class="bar-right"><div class="bar ${c2}" style="width:${w2}px"></div></div>
      </div>`;
    });
  });
  out.innerHTML = h;
}

// Kick off
loadData();
</script>
</body>
</html>
